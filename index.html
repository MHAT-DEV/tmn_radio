<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TryMeNow Radio - Premium Online Radio Streaming</title>
    <!-- Google Fonts for Modern Typography & Thai Support -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="TryMeNow Radio - Premium Online Radio Streaming player with requests, queue, schedules, and custom visualizer." />
  </head>
  <body class="bg-zinc-950 text-zinc-100 select-none">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Clear Service Workers and Caches to prevent stale preview
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
            console.log('Service Worker unregistered');
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(key) {
            caches.delete(key);
            console.log('Cache cleared:', key);
          });
        });
      }
    </script>
  </body>
</html>
